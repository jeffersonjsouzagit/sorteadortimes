<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorteador de Times</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:32px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
      box-shadow:0 0 15px rgba(0,0,0,.3);
    }

    textarea{
      width:100%;
      min-height:220px;
      border:none;
      border-radius:12px;
      padding:15px;
      font-size:16px;
      resize:none;
      outline:none;
    }

    .info{
      margin-top:10px;
      opacity:.8;
      font-size:14px;
    }

    .goleiros{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:15px;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#22c55e;
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
      margin-top:20px;
    }

    button:hover{
      background:#16a34a;
      transform:scale(1.01);
    }

    .times{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      margin-top:20px;
    }

    .time{
      background:#1e293b;
      border-radius:16px;
      padding:20px;
      box-shadow:0 0 15px rgba(0,0,0,.3);
    }

    .time h2{
      text-align:center;
      margin-bottom:15px;
      color:#22c55e;
    }

    .player{
      background:#334155;
      padding:10px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .gk{
      background:#2563eb;
      font-weight:bold;
    }

    .erro{
      background:#dc2626;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      text-align:center;
      display:none;
    }

    .footer{
      text-align:center;
      margin-top:30px;
      opacity:.5;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>⚽ Sorteador de Times</h1>

    <div class="card">

      <label><strong>Jogadores confirmados:</strong></label>

      <textarea id="jogadores" placeholder="Digite 18 nomes, um por linha...

Exemplo:
Jeff
Carlos
Mateus
João
Pedro"></textarea>

      <div class="info">
        Digite 18 jogadores de linha (sem os goleiros)
      </div>

      <div class="goleiros">
        <div>
          <label><strong>Goleiro Time 1</strong></label>
          <input type="text" id="gk1" placeholder="Nome do goleiro">
        </div>

        <div>
          <label><strong>Goleiro Time 2</strong></label>
          <input type="text" id="gk2" placeholder="Nome do goleiro">
        </div>
      </div>

      <button onclick="sortearTimes()">
        🎲 Sortear Times
      </button>

      <div class="erro" id="erro"></div>

    </div>

    <div class="times" id="resultado"></div>

    <div class="footer">
      Desenvolvido para o rachão de sábado ⚽
    </div>

  </div>

<script>

function embaralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {

    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] = [array[j], array[i]];
  }

  return array;
}

function sortearTimes() {

  const jogadoresTexto = document.getElementById("jogadores").value;

  const goleiro1 = document.getElementById("gk1").value || "Goleiro 1";
  const goleiro2 = document.getElementById("gk2").value || "Goleiro 2";

  const erro = document.getElementById("erro");

  erro.style.display = "none";

  let jogadores = jogadoresTexto
    .split("\n")
    .map(nome => nome.trim())
    .filter(nome => nome !== "");

  if (jogadores.length !== 18) {

    erro.style.display = "block";
    erro.innerHTML = `Você precisa informar exatamente 18 jogadores. Atualmente existem ${jogadores.length}.`;

    return;
  }

  jogadores = embaralhar(jogadores);

  const time1 = jogadores.slice(0,6);
  const time2 = jogadores.slice(6,12);
  const time3 = jogadores.slice(12,18);

  const resultado = document.getElementById("resultado");

  resultado.innerHTML = `

    <div class="time">
      <h2>🔵 Time 1</h2>

      <div class="player gk">🧤 ${goleiro1}</div>

      ${time1.map(j => `<div class="player">${j}</div>`).join("")}
    </div>

    <div class="time">
      <h2>🟢 Time 2</h2>

      <div class="player gk">🧤 ${goleiro2}</div>

      ${time2.map(j => `<div class="player">${j}</div>`).join("")}
    </div>

    <div class="time">
      <h2>🔴 Time 3</h2>

      <div class="player gk">🧤 Revezamento</div>

      ${time3.map(j => `<div class="player">${j}</div>`).join("")}
    </div>

  `;
}

</script>

</body>
</html>
